<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>WebView Bridge Test</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
</head>
<body>

<h2>WebView Bridge Test Page</h2>

<button onclick="sendToFlutter('barcode')">Flutter로 바코드 스캔 요청</button>
<button onclick="sendToFlutter('location')">Flutter로 위치 정보 요청</button>

<p id="result"></p>

<script>
function sendToFlutter(code) {
  window.flutter_inappwebview.callHandler('eventToApp', {
    event: code,
    timestamp: new Date().getTime()
  }).then(function(result) {
    // 앱에서 반환한 응답을 여기서 처리할 수 있습니다
    console.log("///// console /////");
    console.log("result:", result);
    console.log("status:", result.status);
    console.log("data:", result.data);

    if (result.data.barcode != null) {
      console.log("barcode", result.data.barcode);
    }
    
    if (result.data.latitude != null) {
      console.log("latitude", result.data.latitude);
    }
    
    if (result.data.longitude != null) {
      console.log("longitude", result.data.longitude);
    }
    
    console.log("--------------------");
  });
}

</script>

</body>
</html>
