<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>WebView Bridge Test</title>
</head>
<body>

<h2>WebView Bridge Test Page</h2>

<button onclick="sendToFlutter('barcode')">Flutter로 바코드 스캔 요청</button>
<button onclick="sendToFlutter('location')">Flutter로 위치 정보 요청</button>

<p id="result"></p>

<script>
function sendToFlutter(code) {
  window.flutter_inappwebview.callHandler('eventToApp', {
    event: code,
    timestamp: new Date().getTime()
  }).then(function(result) {
    // 앱에서 반환한 응답을 여기서 처리할 수 있습니다.
    console.log("앱으로부터의 응답:", result);
    console.log("앱으로부터의 응답:", result.status);
  });
}

// Flutter → Web 호출 테스트용
function receiveFromFlutter() {
  document.getElementById("result").innerText = "Flutter가 이 함수를 호출했어요!";
}

// Flutter에서 호출할 함수
function fromFlutter(message) {
  document.getElementById("result").innerText = message;
}
</script>

</body>
</html>
